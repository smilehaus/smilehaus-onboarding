    function calcDueDates(startStr, schedule) {
      const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const workDayNums = new Set();
      dayNames.forEach((d,i) => { if (schedule[d]) workDayNums.add(i); });
      const dates = {};
      const cur = new Date(startStr + "T09:00:00");
      for (let td = 1; td <= 20; td++) {
        while (!workDayNums.has(cur.getDay())) cur.setDate(cur.getDate() + 1);
        dates[td] = cur.getTime();
        cur.setDate(cur.getDate() + 1);
      }
      return dates;

      try { localStorage.setItem(HISTORY_KEY, JSON.stringify(arr.slice(0, 100))); }

      const idx = list.findIndex(e => e.id === entry.id);
      if (idx >= 0) list[idx] = { ...list[idx], ...entry };
      else list.unshift(entry);
      saveHistory(list);
      return list;
    };

          setForm(f => ({ ...f, office: v, schedule: newSched }));
        } else {
          setForm(f => ({ ...f, [k]: v }));
        }
      };
      const setSched = (day, val) => setForm(f => ({ ...f, schedule: { ...f.schedule, [day]: val } }));
      const addLog = (msg, type = "info") => setLog(prev => [...prev, { msg, type }]);

      useEffect(() => {
        if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
      }, [log]);

      const workDays = Object.values(form.schedule).filter(v => v !== "");
      const canRun = form.name && form.office && form.role && form.start && workDays.length > 0;

      async function runOnboarding(existingId) {
        setPhase("running");
        setLog([]);
        addLog(`Starting onboarding for ${form.name}...`, "start");

        const subId = existingId || `sub_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
        setLastSubId(subId);

        const payload = {
          submissionId: subId,
          name: form.name,
          office: form.office,
          role: form.role,
          start: form.start,
          traineeEmail: form.traineeEmail,
          trainerEmail: form.trainerEmail,
          homeOfficeId: OFFICE_TO_CLICKUP_ID[form.office] || "",
          tasks: TASKS_PC.map(t => ({...t, due: calcDueDates(form.start, form.schedule)[t.d] || null})),
        };

        // Record attempt in history BEFORE fetch
        const baseEntry = {
          id: subId,
          name: form.name,
          office: form.office,
          role: form.role,
          start: form.start,
          traineeEmail: form.traineeEmail,
          trainerEmail: form.trainerEmail,
          submittedAt: new Date().toISOString(),
          status: "sending",
          attempts: (loadHistory().find(e=>e.id===subId)?.attempts || 0) + 1,
          responseStatus: null,
          responseBody: null,
          error: null,
          payload,
        };
        setHistory(upsertHistory(baseEntry));
        addLog(`📋 Logged to history (ID: ${subId})`, "info");

        try {
          const resp = await fetch("https://hook.us2.make.com/eupqr1ujk4onc2wyhvrz4ykng411k9f8", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const bodyText = await resp.text().catch(()=>"");
          const finalStatus = resp.ok ? "sent" : "failed";
          setHistory(upsertHistory({
            id: subId,
            status: finalStatus,
            responseStatus: resp.status,
            responseBody: bodyText.slice(0, 1000),
            completedAt: new Date().toISOString(),
            error: resp.ok ? null : `HTTP ${resp.status}: ${bodyText.slice(0,200)}`,
          }));

          if (!resp.ok) throw new Error(`Webhook returned ${resp.status}: ${bodyText.slice(0, 200)}`);

          addLog("✅ Onboarding request sent to Make.com", "success");
          addLog(`   Response: ${bodyText.slice(0,80) || "(empty)"}`, "info");
          addLog("⚙️ Make.com scenario is now creating folder + 49 tasks...", "tool");
          addLog("   Check ClickUp in ~30–60 seconds for the folder", "info");
          addLog("", "divider");
          addLog(`⚠️ NOTE: Make.com has a known filter bug between modules 8→9`, "warn");
          addLog(`   If quiz tasks don't get quiz URLs, that filter is missing.`, "warn");
          addLog(`   Add filter in Make.com UI: condition "1.tasks[].quiz" is not empty`, "warn");
          addLog("", "divider");
          addLog(`🦷 Onboarding triggered for ${form.name} — see History tab for status`, "success");
          setPhase("done");
        } catch (err) {
          setHistory(upsertHistory({
            id: subId,
            status: "failed",
            error: err.message,
            completedAt: new Date().toISOString(),
          }));
          addLog(`❌ ${err.message}`, "error");
          addLog(`   Submission ID: ${subId} — you can retry from the History tab.`, "warn");
          setPhase("error");
        }
      }

      function retryFromHistory(entry) {
        setForm({
          name: entry.name || "",
          office: entry.office || "",
          role: entry.role || "",
          start: entry.start || "",
          traineeEmail: entry.traineeEmail || "",
          trainerEmail: entry.trainerEmail || "",
          schedule: entry.payload?.tasks ? inferScheduleFromTasks(entry.payload.tasks) : { Mon:"", Tue:"", Wed:"", Thu:"", Fri:"", Sat:"", Sun:"" },
        });
        setTab("onboard");
        setPhase("idle");
      }

      function inferScheduleFromTasks(tasks) {
        // Best-effort: default to entry's office if present via form prefill
        return { Mon:"", Tue:"", Wed:"", Thu:"", Fri:"", Sat:"", Sun:"" };
      }

      function deleteHistoryEntry(id) {
        const list = loadHistory().filter(e => e.id !== id);
        saveHistory(list);
        setHistory(list);
      }

      function clearAllHistory() {
        if (!confirm("Delete ALL history? This cannot be undone.")) return;
        saveHistory([]);
        setHistory([]);
      }

      function copyPayload(entry) {
        navigator.clipboard.writeText(JSON.stringify(entry.payload, null, 2))
          .then(()=>alert("Payload copied to clipboard"))
          .catch(()=>alert("Copy failed — open browser console to inspect"));
      }

      function reset() {
        setPhase("idle");
        setLog([]);
        setForm({ name:"", office:"", role:"", start:"", traineeEmail:"", trainerEmail:"", schedule:{ Mon:"", Tue:"", Wed:"", Thu:"", Fri:"", Sat:"", Sun:"" } });
      }

      const logColor = (type) => ({
        success:"#6fcf97", error:"#eb5757", warn:"#f2c94c",
        tool:"#877765", start:"#C2B09E", divider:"#555", info:"#a8a8a8"
      }[type] || "#a8a8a8");

      const s = {
        root: { minHeight:"100vh", background:SH.cream, fontFamily:"'Jost','Helvetica Neue',sans-serif", color:SH.charcoal, padding:"40px 24px", display:"flex", flexDirection:"column", alignItems:"center" },
        card: { width:"100%", maxWidth:560, background:"#fff", borderRadius:2, border:`1px solid ${SH.sand}`, overflow:"hidden" },
        header: { background:SH.charcoal, padding:"28px 32px", display:"flex", flexDirection:"column", alignItems:"center", gap:10 },
        headerSub: { fontSize:10, fontWeight:700, letterSpacing:"0.14em", textTransform:"uppercase", color:SH.sand },
        body: { padding:"28px 32px" },
        secLabel: { fontSize:10, fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color:SH.taupe, marginBottom:12, marginTop:20 },
        grid2: { display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 },
        grid1: { display:"grid", gridTemplateColumns:"1fr", gap:12 },
        field: { display:"flex", flexDirection:"column" },
        label: { fontSize:11, color:SH.taupe, marginBottom:5 },
        input: { padding:"9px 12px", border:`1px solid ${SH.sand}`, borderRadius:2, fontSize:13, color:SH.charcoal, background:"#fff", fontFamily:"inherit" },
        select: { padding:"9px 12px", border:`1px solid ${SH.sand}`, borderRadius:2, fontSize:13, color:SH.charcoal, background:"#fff", fontFamily:"inherit", cursor:"pointer" },
        divider: { height:1, background:SH.sand, margin:"24px 0" },
        btn: { width:"100%", padding:"12px 20px", background:SH.charcoal, color:SH.cream, border:"none", borderRadius:2, fontSize:13, fontWeight:600, letterSpacing:"0.06em", textTransform:"uppercase", cursor:"pointer", fontFamily:"inherit" },
        btnDis: { background:SH.sand, color:SH.taupe, cursor:"not-allowed" },
        logBox: { background:"#000", borderRadius:2, padding:"16px 18px", fontFamily:"'Courier New',monospace", fontSize:12, lineHeight:1.7, minHeight:200, maxHeight:360, overflowY:"auto", display:"flex", flexDirection:"column" },
        logLine: { display:"block", marginBottom:2 },
        spinner: { display:"inline-block", width:12, height:12, border:`2px solid ${SH.beige}`, borderTopColor:SH.cream, borderRadius:"50%", animation:"spin 0.8s linear infinite", marginRight:8, verticalAlign:"middle" },
      };

      return (
        <div style={s.root}>
          <div style={s.card}>
            <div style={s.header}>
              <img src={LOGO} alt="Smile Haus" style={{height:40,width:"auto",display:"block"}} />
              <div style={s.headerSub}>New Member Onboarding</div>
            </div>

            <div style={{display:"flex",borderBottom:`1px solid ${SH.sand}`,background:"#fff"}}>
              <button onClick={()=>setTab("onboard")} style={{flex:1,padding:"14px 0",background:"transparent",border:"none",borderBottom:tab==="onboard"?`2px solid ${SH.charcoal}`:"2px solid transparent",fontSize:11,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:tab==="onboard"?SH.charcoal:SH.taupe,cursor:"pointer",fontFamily:"inherit"}}>New Trainee</button>
              <button onClick={()=>setTab("history")} style={{flex:1,padding:"14px 0",background:"transparent",border:"none",borderBottom:tab==="history"?`2px solid ${SH.charcoal}`:"2px solid transparent",fontSize:11,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:tab==="history"?SH.charcoal:SH.taupe,cursor:"pointer",fontFamily:"inherit",position:"relative"}}>
                History {history.length>0 && <span style={{background:SH.taupe,color:SH.cream,fontSize:9,padding:"2px 6px",borderRadius:10,marginLeft:4,verticalAlign:"middle"}}>{history.length}</span>}
              </button>
            </div>

            {tab === "history" && <div style={s.body}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div style={s.secLabel}>Onboarding History</div>
                {history.length > 0 && <button onClick={clearAllHistory} style={{fontSize:10,padding:"4px 10px",background:"transparent",border:`1px solid ${SH.sand}`,color:SH.taupe,cursor:"pointer",borderRadius:2,letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600,fontFamily:"inherit"}}>Clear All</button>}
              </div>
              {history.length === 0 && <div style={{textAlign:"center",padding:"40px 20px",color:SH.taupe,fontSize:13,fontStyle:"italic"}}>No onboarding submissions yet.<br/>Requests will appear here after you submit.</div>}
              {history.map(entry => {
                const statusStyle = {
                  sent:    {bg:"#e8f5e9", fg:"#2e7d32", label:"SENT"},
                  sending: {bg:"#fff8e1", fg:"#b26a00", label:"SENDING"},
                  failed:  {bg:"#fdecea", fg:"#c62828", label:"FAILED"},
                }[entry.status] || {bg:SH.sand,fg:SH.charcoal,label:(entry.status||"?").toUpperCase()};
                const when = new Date(entry.submittedAt).toLocaleString();
                const clickupSearch = `https://app.clickup.com/9014079163/v/l/li/901415197832?search=${encodeURIComponent(entry.name || "")}`;
                return (
                  <div key={entry.id} style={{border:`1px solid ${SH.sand}`,borderRadius:2,padding:14,marginBottom:12,background:"#fff"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8,gap:12}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,fontSize:14}}>{entry.name || "(no name)"}</div>
                        <div style={{fontSize:11,color:SH.taupe,marginTop:2}}>{entry.role} · {entry.office} · Starts {entry.start}</div>
                        <div style={{fontSize:10,color:SH.beige,marginTop:4,fontFamily:"'Courier New',monospace"}}>{when} · {entry.attempts||1} attempt{entry.attempts>1?"s":""}</div>
                      </div>
                      <div style={{fontSize:9,fontWeight:700,letterSpacing:"0.1em",padding:"3px 8px",borderRadius:2,background:statusStyle.bg,color:statusStyle.fg,whiteSpace:"nowrap"}}>{statusStyle.label}</div>
                    </div>
                    {entry.error && <div style={{fontSize:11,color:"#c62828",background:"#fdecea",padding:"6px 10px",borderRadius:2,marginBottom:8,fontFamily:"'Courier New',monospace",wordBreak:"break-word"}}>⚠ {entry.error}</div>}
                    {entry.responseBody && <div style={{fontSize:11,color:SH.taupe,background:SH.cream,padding:"6px 10px",borderRadius:2,marginBottom:8,fontFamily:"'Courier New',monospace",wordBreak:"break-word"}}>HTTP {entry.responseStatus}: {entry.responseBody || "(empty)"}</div>}
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      <button onClick={()=>retryFromHistory(entry)} style={{fontSize:10,padding:"5px 10px",background:SH.charcoal,color:SH.cream,border:"none",cursor:"pointer",borderRadius:2,letterSpacing:"0.06em",textTransform:"uppercase",fontWeight:600,fontFamily:"inherit"}}>Retry</button>
                      <button onClick={()=>copyPayload(entry)} style={{fontSize:10,padding:"5px 10px",background:"transparent",border:`1px solid ${SH.sand}`,color:SH.taupe,cursor:"pointer",borderRadius:2,letterSpacing:"0.06em",textTransform:"uppercase",fontWeight:600,fontFamily:"inherit"}}>Copy Payload</button>
                      <a href={clickupSearch} target="_blank" rel="noopener" style={{fontSize:10,padding:"5px 10px",background:"transparent",border:`1px solid ${SH.sand}`,color:SH.taupe,cursor:"pointer",borderRadius:2,letterSpacing:"0.06em",textTransform:"uppercase",fontWeight:600,textDecoration:"none",display:"inline-block"}}>View in ClickUp</a>
                      <button onClick={()=>deleteHistoryEntry(entry.id)} style={{fontSize:10,padding:"5px 10px",background:"transparent",border:`1px solid ${SH.sand}`,color:"#c62828",cursor:"pointer",borderRadius:2,letterSpacing:"0.06em",textTransform:"uppercase",fontWeight:600,fontFamily:"inherit"}}>Delete</button>
                    </div>
                  </div>
                );
              })}
              <div style={{fontSize:10,color:SH.taupe,marginTop:16,padding:"10px 12px",background:SH.cream,borderRadius:2,lineHeight:1.5}}>
                <b>Note:</b> History is stored in this browser only (localStorage). Clearing browser data will remove it.
                <br/>"SENT" means Make.com accepted the webhook — verify actual ClickUp folder creation via "View in ClickUp".
              </div>
            </div>}

            {tab === "onboard" && <div style={s.body}>
              {phase === "idle" && <>
                <div style={s.secLabel}>Employee Information</div>
                <div style={{...s.grid2, marginBottom:12}}>
                  <div style={s.field}>
                    <label style={s.label}>Full Name *</label>
                    <input style={s.input} value={form.name} onChange={e=>set("name",e.target.value)} placeholder="Debbie Martinez" />
                  </div>
                  <div style={s.field}>
                    <label style={s.label}>Home Office *</label>
                    <select style={s.select} value={form.office} onChange={e=>set("office",e.target.value)}>
                      <option value="">Select office</option>
                      {OFFICES.map(o=><option key={o} value={o}>{o}</option>)}
                    </select>
                  </div>
                </div>
                <div style={s.grid1}>
                  <div style={s.field}>
                    <label style={s.label}>Role *</label>
                    <select style={s.select} value={form.role} onChange={e=>set("role",e.target.value)}>
                      <option value="">Select role</option>
                      {ROLES.map(r=><option key={r} value={r}>{r}</option>)}
                    </select>
                  </div>
                </div>
                <div style={{marginTop:12}}>
                  <div style={s.field}>
                    <label style={s.label}>Start Date *</label>
                    <input style={s.input} type="date" value={form.start} onChange={e=>set("start",e.target.value)} />
                  </div>
                </div>
                <div style={s.secLabel}>Weekly Work Schedule</div>
                <div style={{fontSize:11,color:SH.taupe,marginBottom:10}}>Select which office the trainee works at each day. Leave blank for days off.</div>
                <div style={{display:"grid",gridTemplateColumns:"60px 1fr",gap:"6px 8px",alignItems:"center"}}>
                  {DAYS.map(d => {
                    const officeSched = form.office ? (OFFICE_SCHEDULE[form.office] || {}) : {};
                    const dayStatus = officeSched[d];
                    const isClosed = dayStatus === false;
                    const isAdmin = dayStatus === "admin";
                    return (<React.Fragment key={d}>
                      <div style={{fontSize:12,fontWeight:600,color:isClosed?SH.sand:SH.charcoal}}>{d}{isAdmin ? <span style={{fontSize:9,color:SH.taupe}}> (adm)</span> : ""}</div>
                      <select style={{...s.select,fontSize:12,padding:"6px 8px",color:form.schedule[d]?SH.charcoal:SH.beige,background:isClosed?"#f5f3ef":"#fff"}}
                        value={form.schedule[d]} onChange={e=>setSched(d,e.target.value)} disabled={isClosed}>
                        <option value="">{isClosed?"Closed":"OFF"}</option>
                        {OFFICES.map(o=><option key={o} value={o}>{o}</option>)}
                      </select>
                    </React.Fragment>);
                  })}
                </div>
                <div style={{fontSize:10,color:SH.taupe,marginTop:6}}>{workDays.length} training day{workDays.length!==1?"s":""}/week — ~{Math.ceil(20/Math.max(workDays.length,1))} weeks to complete</div>
                <div style={s.secLabel}>ClickUp Users (Optional)</div>
                <div style={{...s.grid1, gap:12}}>
                  <div style={s.field}>
                    <label style={s.label}>Trainee Email</label>
                    <input style={s.input} type="email" value={form.traineeEmail} onChange={e=>set("traineeEmail",e.target.value)} placeholder="debbie@smilehaus.com" />
                  </div>
                  <div style={s.field}>
                    <label style={s.label}>Trainer Email</label>
                    <input style={s.input} type="email" value={form.trainerEmail} onChange={e=>set("trainerEmail",e.target.value)} placeholder="trainer@smilehaus.com" />
                  </div>
                </div>
                <div style={s.divider} />
                <button style={{...s.btn,...(!canRun?s.btnDis:{})}} disabled={!canRun} onClick={runOnboarding}>
                  Run Onboarding Automation
                </button>
                {!canRun && <div style={{textAlign:"center",fontSize:11,color:SH.taupe,marginTop:10}}>Fill in all required fields to continue</div>}
              </>}

              {(phase==="running"||phase==="done"||phase==="error") && <>
                <div style={{padding:"12px 16px",background:SH.cream,border:`1px solid ${SH.sand}`,borderRadius:2,marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13}}>{form.name}</div>
                    <div style={{fontSize:11,color:SH.taupe,marginTop:2}}>{form.role} · {form.office} · Starts {form.start}</div>
                  </div>
                  <div style={{fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",padding:"4px 10px",borderRadius:2,background:phase==="done"?"#e8f5e9":phase==="error"?"#fdecea":SH.sand,color:phase==="done"?"#2e7d32":phase==="error"?"#c62828":SH.charcoal}}>
                    {phase==="running"?"Running...":phase==="done"?"Complete":"Error"}
                  </div>
                </div>
                <div style={s.logBox} ref={logRef}>
                  {phase==="running"&&log.length===0&&<span style={{color:SH.beige}}><span style={s.spinner}/>Connecting to ClickUp...</span>}
                  {log.map((e,i)=><span key={i} style={{...s.logLine,color:logColor(e.type)}}>{e.type==="divider"?"─────────────────────────────────":e.msg}</span>)}
                  {phase==="running"&&log.length>0&&<span style={{color:SH.beige}}><span style={s.spinner}/></span>}
                </div>
                {(phase==="done"||phase==="error")&&<><div style={s.divider}/><button style={s.btn} onClick={reset}>Onboard Another Team Member</button></>}
              </>}
            </div>}
          </div>
          <div style={{marginTop:20,fontSize:11,color:SH.taupe,letterSpacing:"0.05em",textAlign:"center"}}>
            SMILE HAUS · MODERN FAMILY DENTISTRY & ORTHODONTICS
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
