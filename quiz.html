align pricing scenarios must front desk master?","1 (standard fee)","2 (insurance and no insurance)","3 (with insurance, without insurance, with In-Haus Membership)","4 (adult, teen, express, comprehensive)","c"],[15,"What is the first step when an implant case is outside in-house scope?","Tell the patient it cannot be done","Refer to the appropriate specialist per referral workflow","Have the patient find their own specialist","Schedule anyway and figure it out later","b"]]},{"name":"Treatment Plan Presentation","questions":[[16,"For same-day treatment, the correct verbiage is:","Do you want to do the filling today?","Since you are already here and numbed up, Dr. Name can take care of that right now","We can try to fit it in if you want","The doctor says you need this done","b"],[17,"For collecting a balance, the correct approach is:","You have a balance of...","Your insurance did not cover...","Let us go ahead and get your account current, your balance today is...","We need payment before your next visit","c"]]},{"name":"Conflict Resolution","questions":[[18,"Patient upset about their bill. What is the first step?","Explain why the charge is correct","Acknowledge, empathize, then act using approved de-escalation verbiage","Transfer to billing department","Offer a discount","b"],[19,"A patient becomes verbally abusive at the front desk. When should you ask them to leave?","Never, always de-escalate","When they use profanity","When de-escalation fails and behavior is threatening, per protocol","Only if the doctor says so","c"],[20,"After any conflict incident with a patient, what is mandatory?","Calling the patient to apologize","Post-incident documentation in Oryx/ClickUp","Offering the patient a credit","Reporting to corporate","b"]]}]}};
